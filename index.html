<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightclub Simulator</title>
    <meta name="description" content="Nightclub Simulator VR - official community page with updates, tutorials, events, and a feedback survey!">
    <meta name="author" content="Nightclub Simulator">
    <meta name="theme-color" content="#000000">
    <link rel="canonical" href="https://nightclubsim.github.io/">
    <meta property="og:title" content="Nightclub Simulator VR">
    <meta property="og:description" content="Nightclub Simulator VR - official community page with updates, tutorials, events, and a feedback survey!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nightclubsim.github.io/">
    <meta property="og:image" content="https://i.imgur.com/4bLr0HX.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nightclub Simulator VR">
    <meta name="twitter:description" content="Explore Nightclub Simulator VR with store links, tutorials, and community updates.">
    <meta name="twitter:image" content="https://i.imgur.com/4bLr0HX.png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Site CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Background Canvas -->
    <canvas id="bg"></canvas>

    <!-- Discord Button -->
    <a href="https://discord.gg/U7DDdeqd5k" target="_blank" class="discord-button" title="Join our Discord Server">
        Discord
    </a>

    <!-- Header -->
    <header class="site-header homepage-header">
        <a href="index.html" class="header-logo-link" aria-label="Go to homepage">
            <img src="assets/decals/logo.png" alt="Nightclub Simulator Logo" class="header-logo">
        </a>
        <div class="homepage-header-row">
            <span class="header-game-name">Nightclub Simulator</span>
            <button id="menuToggle" class="menu-button" aria-label="Open menu">Menu</button>
        </div>
    </header>

    <!-- Hidden Top Menu -->
    <div id="topMenu" class="top-menu">
        <div class="top-menu-panel">
            <button id="closeMenu" class="menu-close" aria-label="Close menu">&times;</button>
            <nav class="top-menu-links">
                <a class="menu-link disabled" aria-disabled="true">Beta Tutorial</a>
                <a href="survey.html" class="menu-link">Player Survey</a>
            </nav>
        </div>
    </div>

    <main class="homepage-content">
        <h1 class="site-title">Nightclub Simulator VR</h1>
        <p class="site-header-text">Welcome to the official Nightclub Simulator community page.</p>
        <p class="homepage-description">Explore our latest updates, tutorials, and events!</p>
        <div class="homepage-actions">
            <a href="https://www.oculus.com/experiences/quest/5332536576829015/" target="_blank" class="store-badge-link" aria-label="Get it on Quest">
                <img src="assets/decals/quest-badge.png" alt="Get it on Quest" class="store-badge">
            </a>
            <a href="https://store.steampowered.com/app/2729480/NightClub_Simulator/" target="_blank" class="store-badge-link" aria-label="Get it on Steam">
                <img src="assets/decals/steam-badge.png" alt="Get it on Steam" class="store-badge">
            </a>
        </div>

        <div class="homepage-pages">
            <a class="page-button disabled" aria-disabled="true">Beta Tutorial</a>
            <a href="survey.html" class="page-button">Player Survey</a>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Nightclub Simulator VR</p>
    </footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const openMenuButton = document.getElementById('openMenuButton');
        const closeMenu = document.getElementById('closeMenu');
        const topMenu = document.getElementById('topMenu');

        function toggleMenu(show) {
            topMenu.classList.toggle('active', show);
        }

        if (menuToggle) {
            menuToggle.addEventListener('click', () => toggleMenu(true));
        }

        if (openMenuButton) {
            openMenuButton.addEventListener('click', () => toggleMenu(true));
        }

        if (closeMenu) {
            closeMenu.addEventListener('click', () => toggleMenu(false));
        }

        if (topMenu) {
            topMenu.addEventListener('click', (event) => {
                if (event.target === topMenu) {
                    toggleMenu(false);
                }
            });
        }
    </script>
    <script src="assets/js/background.js"></script>
</body>
</html>
